<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Crossing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#loading {
  position: fixed; inset: 0; background: #87CEEB;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 22px; color: #3a5a3a; font-weight: 600; gap: 14px; z-index: 99;
}
#loading-bar-wrap {
  width: 220px; height: 10px; background: rgba(0,0,0,0.15); border-radius: 6px; overflow: hidden;
}
#loading-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.2s; border-radius: 6px; }
#location {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.45); color: #fff; padding: 6px 18px;
  border-radius: 20px; font-size: 14px; pointer-events: none;
  backdrop-filter: blur(4px); letter-spacing: 0.05em;
}
#hint {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 13px; display: none; pointer-events: none;
}
#msg {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(255,210,80,0.93); color: #333; padding: 9px 20px;
  border-radius: 20px; font-size: 14px; display: none; pointer-events: none;
  font-weight: 600; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
#controls {
  position: fixed; bottom: 14px; right: 16px;
  background: rgba(0,0,0,0.45); color: #bbb; padding: 10px 14px;
  border-radius: 12px; font-size: 11px; line-height: 1.9; pointer-events: none;
}
#inventory {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0,0,0,0.45); color: #fff; padding: 8px 14px;
  border-radius: 12px; font-size: 12px; pointer-events: none; display: none;
}
#credit {
  position: fixed; bottom: 14px; left: 16px;
  background: rgba(0,0,0,0.35); color: #999; padding: 6px 10px;
  border-radius: 8px; font-size: 10px; pointer-events: none; max-width: 260px; line-height: 1.5;
}
#version {
  position: fixed; bottom: 14px; right: 16px; /* sits below #controls when controls hidden */
  color: rgba(255,255,255,0.25); font-size: 10px; pointer-events: none;
  font-family: monospace;
}
#debug-door {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(200,0,0,0.85); color: #fff; padding: 10px 18px;
  border-radius: 12px; font-size: 12px; pointer-events: none;
  font-family: monospace; line-height: 1.8; display: none; text-align: center;
}
#debug-bed {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,100,200,0.88); color: #fff; padding: 10px 18px;
  border-radius: 12px; font-size: 12px; pointer-events: none;
  font-family: monospace; line-height: 1.8; display: none; text-align: center;
}
</style>
</head>
<body>

<div id="loading">
  🌿 Loading Cozy Crossing…
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="version">v0.2</div>
<div id="location">🌿 Cozy Garden</div>
<div id="hint"></div>
<div id="msg"></div>
<div id="debug-door"></div>
<div id="debug-bed"></div>
<div id="inventory">★ Golden Star</div>
<div id="controls">WASD / ↑↓←→ — Move<br>E — Interact</div>
<div id="credit">Character: "Animal crossing character" by Mua (sketchfab.com/mualab) — CC-BY-4.0<br>Scene: "Animal crossing" by minlibi (sketchfab.com/minlibi) — CC-BY-4.0</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── CONFIG ────────────────────────────────────────────────────────────────
const VERSION        = '0.2';
const SPEED          = 4.2;
const CAM_OFFSET_EXT = new THREE.Vector3(0, 11, 9);
// Interior: sit above the open-top room, slightly toward the front, looking down
const CAM_OFFSET_INT = new THREE.Vector3(0, 7, 3);
// Model comes in at 100× scale internally; 0.01 brings it to ~2.6 units tall
const MODEL_SCALE = 0.01;
// Rotation to face +Z (adjust if character walks backward)
const MODEL_FACE  = 0;
// Set true to show a red wireframe sphere at the door trigger (tune & disable)
const DEBUG_DOOR  = false;
// Set true to show bed-position nudge HUD while resting (tune & disable)
const DEBUG_BED   = false;

// ── PALETTE ───────────────────────────────────────────────────────────────
const P = {
  sky:       0x87CEEB, skyFog:  0xb0dff0,
  skyIn:     0xfff5e4,
  ground:    0x6dba43, grass2:  0x55a532,
  path:      0xe2cfa0,
  wall:      0xf5e6c8, roof:    0xc0392b,
  door:      0x8b5e3c, trim:    0xdeb887,
  win:       0xadd8e6,
  trunk:     0x795548, leaf:    0x4caf50, leaf2: 0x388e3c,
  fence:     0xf5f0e0,
  flR:       0xff6b6b, flY: 0xffd93d, flP: 0xcc99ff, stem: 0x66bb6a,
  floorA:    0xd4a96a, floorB: 0xc4995a,
  wallIn:    0xfff8e7, wallInD: 0xf0e0c8,
  bed:       0x6d4c41, sheet: 0xbbdefb,
  table:     0x8d6e63, chair:   0xa1887f,
  rug:       0xe53935,
  book0:     0xff5252, book1:  0x448aff, book2: 0x69f0ae, book3: 0xffab40, book4: 0xea80fc,
  plant:     0x43a047, pot:    0xc17f3e,
  gold:      0xffd700,
};

// ── RENDERER / CAMERA ─────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 200);
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ── HELPERS ───────────────────────────────────────────────────────────────
const lm = c => new THREE.MeshLambertMaterial({ color: c });

function box(w, h, d, color, parent) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), lm(color));
  m.castShadow = m.receiveShadow = true;
  parent?.add(m);
  return m;
}
function cyl(rt, rb, h, color, parent, segs = 8) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, segs), lm(color));
  m.castShadow = true;
  parent?.add(m);
  return m;
}
function cone(r, h, color, parent, segs = 8) {
  const m = new THREE.Mesh(new THREE.ConeGeometry(r, h, segs), lm(color));
  m.castShadow = true;
  parent?.add(m);
  return m;
}
function sphere(r, color, parent, s = 6) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, s, s), lm(color));
  parent?.add(m);
  return m;
}

function addLight(scene, indoor) {
  scene.add(new THREE.AmbientLight(indoor ? 0xfff0d8 : 0xffffff, indoor ? 0.75 : 0.55));
  const sun = new THREE.DirectionalLight(indoor ? 0xffe4b0 : 0xfff8f0, indoor ? 0.7 : 1.1);
  sun.position.set(12, 20, 12);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  Object.assign(sun.shadow.camera, { left: -22, right: 22, top: 22, bottom: -22, near: 0.5, far: 70 });
  scene.add(sun);
}

// ── SCENES ────────────────────────────────────────────────────────────────
const extScene = new THREE.Scene();
extScene.background = new THREE.Color(P.sky);
extScene.fog = new THREE.Fog(P.skyFog, 30, 65);
addLight(extScene, false);

const intScene = new THREE.Scene();
intScene.background = new THREE.Color(P.skyIn);
addLight(intScene, true);

// ── EXTERIOR ──────────────────────────────────────────────────────────────
function buildExterior() {
  // Fallback ground so nothing is void while model loads
  const gnd = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), lm(P.ground));
  gnd.rotation.x = -Math.PI / 2;
  gnd.receiveShadow = true;
  extScene.add(gnd);
}

// ── INTERIOR ──────────────────────────────────────────────────────────────
let pickupMesh = null;
let hasItem    = false;
let BED_POS    = null;   // world position of the bed, set after room loads
let resting    = false;  // true while player is on the bed

function spawnStar() {
  const starG = new THREE.Group();
  starG.position.set(0, 1.0, 0); // centre of room, floating — adjust if needed
  intScene.add(starG);
  pickupMesh = starG;
  const star = new THREE.Mesh(new THREE.OctahedronGeometry(0.2), lm(P.gold));
  starG.add(star);
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.035, 6, 14), lm(0xffec8b));
  ring.rotation.x = Math.PI / 2;
  starG.add(ring);
}

function loadInterior(onDone) {
  const loader = new GLTFLoader();
  loader.load(
    'cozy_room/scene.gltf',
    (gltf) => {
      const model = gltf.scene;
      model.traverse(m => {
        if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; }
      });

      // Scale so the room is ~4 units tall — feels right for a 1.8-unit character
      const bbox   = new THREE.Box3().setFromObject(model);
      const hModel = bbox.max.y - bbox.min.y;
      const sc     = 4 / hModel;
      model.scale.setScalar(sc);

      // Re-centre: floor at y=0, centred on X/Z
      bbox.setFromObject(model);
      model.position.x = -(bbox.min.x + bbox.max.x) / 2;
      model.position.z = -(bbox.min.z + bbox.max.z) / 2;
      model.position.y = -bbox.min.y;

      intScene.add(model);

      // Auto-compute walkable bounds from the room model (with a small inset)
      const fb    = new THREE.Box3().setFromObject(model);
      const inset = 0.4;
      BOUNDS_INT.minX = fb.min.x + inset;
      BOUNDS_INT.maxX = fb.max.x - inset;
      BOUNDS_INT.minZ = fb.min.z + inset;
      BOUNDS_INT.maxZ = fb.max.z - inset;
      console.log('[CozyC] Interior bounds:', BOUNDS_INT);

      // Auto-detect bed mesh
      const bedKeywords = ['bed', 'mattress', 'pillow', 'sofa', 'couch', 'futon', 'sleep'];
      let   bedMesh     = null;
      model.traverse(m => {
        if (!m.isMesh || bedMesh) return;
        const n = m.name.toLowerCase();
        if (bedKeywords.some(k => n.includes(k))) bedMesh = m;
      });
      if (bedMesh) {
        const bedBbox = new THREE.Box3().setFromObject(bedMesh);
        BED_SURFACE_Y = bedBbox.max.y;          // world Y of the top of the mattress
        BED_POS = new THREE.Vector3();
        bedMesh.getWorldPosition(BED_POS);
        BED_POS.y = 0;                          // keep y=0 for horizontal distance check
        console.log('[CozyC] Bed found:', bedMesh.name, '→ surface Y:', BED_SURFACE_Y.toFixed(3));
      } else {
        console.warn('[CozyC] No bed mesh found — set BED_POS manually if needed.');
      }

      spawnStar();
      onDone();
    },
    undefined,
    (err) => { console.error('Interior load error:', err); spawnStar(); onDone(); }
  );
}

// ── ENVIRONMENT (GLTF) ────────────────────────────────────────────────────

// After the model is placed, scan its meshes to locate the door trigger.
// Priority: mesh with "door" / "entrance" / "entry" in its name.
// Fallback: use the centre of the front face (min-Z edge) of the bounding box.
function findDoorTrigger(model, sceneBbox) {
  const wp  = new THREE.Vector3();
  let doorMesh = null;

  console.groupCollapsed('[CozyC] House mesh names (click to expand)');
  model.traverse(m => {
    if (!m.isMesh) return;
    const n = m.name.toLowerCase();
    console.log(m.name);
    if (!doorMesh && (n.includes('door') || n.includes('entrance') || n.includes('entry') || n.includes('gate'))) {
      doorMesh = m;
    }
  });
  console.groupEnd();

  if (doorMesh) {
    doorMesh.getWorldPosition(wp);
    wp.y = 0;
    console.log('[CozyC] Door mesh found:', doorMesh.name, '→ trigger at', wp);
    return wp;
  }

  // Fallback: centre-X, centre-Y=0, slightly in front of the nearest Z face
  const cx = (sceneBbox.min.x + sceneBbox.max.x) / 2;
  const fz = sceneBbox.min.z; // whichever face is closest to the player start
  const fallback = new THREE.Vector3(cx, 0, fz + 1.8);
  console.warn('[CozyC] No door mesh found. Using fallback trigger at', fallback,
    '\nSet DEBUG_DOOR = true and adjust DOOR_EXT manually if needed.');
  return fallback;
}

function loadEnvironment(onDone) {
  const loader = new GLTFLoader();
  loader.load(
    'animal_crossing_house_2/scene.gltf',
    (gltf) => {
      const model = gltf.scene;
      model.traverse(m => {
        if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; }
      });

      // Auto-scale: target 8 units tall so the house always towers over the
      // 1.8-unit character (~4.4× ratio), regardless of the model's aspect ratio.
      const bbox   = new THREE.Box3().setFromObject(model);
      const hModel = bbox.max.y - bbox.min.y;
      const sc     = 8 / hModel;
      model.scale.setScalar(sc);

      // Re-measure after scale; center X/Z and floor Y at 0
      bbox.setFromObject(model);
      model.position.x = -(bbox.min.x + bbox.max.x) / 2;
      model.position.z = -(bbox.min.z + bbox.max.z) / 2;
      model.position.y = -bbox.min.y;

      extScene.add(model);

      // ── Auto-detect door trigger ──────────────────────────────────────
      const finalBbox = new THREE.Box3().setFromObject(model);
      DOOR_EXT = findDoorTrigger(model, finalBbox);
      DOOR_EXT.set(0.65, 0, 2.00); // tuned to house_2 door position

      // ── Debug: show a moveable red marker at the trigger ────────────────
      if (DEBUG_DOOR) {
        _dbgSphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.4, 10, 10),
          new THREE.MeshBasicMaterial({ color: 0xff2222, wireframe: true })
        );
        _dbgSphere.position.set(DOOR_EXT.x, 0.5, DOOR_EXT.z);
        extScene.add(_dbgSphere);

        _dbgCol = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.05, 3, 6),
          new THREE.MeshBasicMaterial({ color: 0xff2222 })
        );
        _dbgCol.position.set(DOOR_EXT.x, 1.5, DOOR_EXT.z);
        extScene.add(_dbgCol);

        initDebugDoorUI();
        console.log('[CozyC] DEBUG_DOOR — use I/J/K/L to nudge the red marker onto the door. Set DEBUG_DOOR=false when happy.');
      }

      onDone();
    },
    undefined,
    (err) => { console.error('House load error:', err); onDone(); }
  );
}

// ── PLAYER (GLTF) ─────────────────────────────────────────────────────────
// playerGroup is the container we move around; the actual model lives inside it
// so we can offset/rotate the model without affecting position logic.
const playerGroup = new THREE.Group();
playerGroup.position.set(0, 0, 6);
extScene.add(playerGroup);

let mixer           = null;
let walkAction      = null;
let charModel       = null;  // direct ref to model inside playerGroup
let _charModelOrigY = 0;     // saved foot-offset, restored after lying down
let BED_SURFACE_Y   = 0.4;   // world Y of bed top surface, measured after room loads

let _loadedCount = 0;
function _onAssetLoaded() {
  _loadedCount++;
  document.getElementById('loading-bar').style.width = (_loadedCount * 33) + '%';
  if (_loadedCount < 3) return;
  document.getElementById('loading').style.display = 'none';
  camera.position.copy(playerGroup.position.clone().add(CAM_OFFSET_EXT));
  camera.lookAt(playerGroup.position);
  tick();
}

function loadCharacter() {
  const loader = new GLTFLoader();

  loader.load(
    'animal_crossing_character/scene.gltf',
    (gltf) => {

      const model = gltf.scene;
      model.traverse(m => { if (m.isMesh) m.castShadow = true; });

      // Auto-scale: the char_LP node has scale=100 AND translation y=183
      // so hardcoding MODEL_SCALE is wrong — measure the real bounding box instead.
      const bbox = new THREE.Box3().setFromObject(model);
      const height = bbox.max.y - bbox.min.y;
      const sc = 1.8 / height;           // target: 1.8 units tall
      model.scale.setScalar(sc);

      // Recompute after scaling and shift model so feet sit at y=0
      bbox.setFromObject(model);
      model.position.y = -bbox.min.y;

      model.rotation.y = MODEL_FACE;
      charModel = model;
      _charModelOrigY = model.position.y; // save for restoring after lying
      playerGroup.add(model);

      // AnimationMixer — the single "Scene" clip is the walk cycle
      mixer = new THREE.AnimationMixer(model);
      if (gltf.animations.length > 0) {
        walkAction = mixer.clipAction(gltf.animations[0]);
        walkAction.setLoop(THREE.LoopRepeat, Infinity);
        walkAction.timeScale = 0; // start paused (idle)
        walkAction.play();
      }

      _onAssetLoaded();
    },
    undefined,
    (err) => {
      console.error('GLTF load error:', err);
      document.getElementById('loading').innerHTML =
        '❌ Could not load character.<br><small>Try serving via a local HTTP server.</small>';
    }
  );
}

// ── INPUT ─────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── ORBIT CAMERA ──────────────────────────────────────────────────────────
// Active only while resting; drag mouse / touch to look around the character.
let orbitActive = false;
let orbitTheta  = 1.2;   // horizontal angle (radians)
let orbitPhi    = 1.0;   // vertical angle from top (radians, clamped 0.15–1.4)
let ORBIT_R     = 2.8;   // distance from character (scroll to zoom)

let _drag = false, _lastMX = 0, _lastMY = 0;

function _orbitDrag(dx, dy) {
  orbitTheta -= dx * 0.008;
  orbitPhi    = Math.max(0.15, Math.min(1.4, orbitPhi - dy * 0.008));
}

window.addEventListener('mousedown', e => {
  if (e.button === 0 && orbitActive) { _drag = true; _lastMX = e.clientX; _lastMY = e.clientY; }
});
window.addEventListener('mouseup',   () => _drag = false);
window.addEventListener('mousemove', e => {
  if (!_drag) return;
  _orbitDrag(e.clientX - _lastMX, e.clientY - _lastMY);
  _lastMX = e.clientX; _lastMY = e.clientY;
});

window.addEventListener('touchstart', e => {
  if (!orbitActive) return;
  _drag = true; _lastMX = e.touches[0].clientX; _lastMY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend',   () => _drag = false);
window.addEventListener('touchmove',  e => {
  if (!_drag) return;
  _orbitDrag(e.touches[0].clientX - _lastMX, e.touches[0].clientY - _lastMY);
  _lastMX = e.touches[0].clientX; _lastMY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('wheel', e => {
  if (!orbitActive) return;
  ORBIT_R = Math.max(0.8, Math.min(8.0, ORBIT_R + e.deltaY * 0.01));
  e.preventDefault();
}, { passive: false });

// ── STATE ─────────────────────────────────────────────────────────────────
let indoor    = false;
let starAngle = 0;
let eWasDown  = false;

// ── TRIGGERS ──────────────────────────────────────────────────────────────
// Auto-set after the house GLTF loads (see findDoorTrigger).
// Falls back to (0,0,0) until the model is ready.
let DOOR_EXT = new THREE.Vector3(0, 0, 0);
const DOOR_INT = new THREE.Vector3(0, 0, 2.2);

// ── UI HELPERS ────────────────────────────────────────────────────────────
const hintEl      = document.getElementById('hint');
const locEl       = document.getElementById('location');
const msgEl       = document.getElementById('msg');
const invEl       = document.getElementById('inventory');
const debugDoorEl = document.getElementById('debug-door');
const debugBedEl  = document.getElementById('debug-bed');
const controlsEl  = document.getElementById('controls');

let msgTimer = null;
function showMsg(txt) {
  msgEl.textContent = txt;
  msgEl.style.display = 'block';
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { msgEl.style.display = 'none'; }, 3200);
}

// ── DEBUG DOOR NUDGE ──────────────────────────────────────────────────────
// Refs to the visible marker meshes so we can reposition them live
let _dbgSphere = null;
let _dbgCol    = null;

function nudgeDoorTrigger() {
  if (!DEBUG_DOOR || indoor) return;
  const step = 0.5;
  let moved = false;
  if (keys['KeyI']) { DOOR_EXT.z -= step; moved = true; }
  if (keys['KeyK']) { DOOR_EXT.z += step; moved = true; }
  if (keys['KeyJ']) { DOOR_EXT.x -= step; moved = true; }
  if (keys['KeyL']) { DOOR_EXT.x += step; moved = true; }

  if (moved) {
    // Clamp key repeat so each press moves exactly one step
    keys['KeyI'] = keys['KeyK'] = keys['KeyJ'] = keys['KeyL'] = false;

    if (_dbgSphere) { _dbgSphere.position.x = DOOR_EXT.x; _dbgSphere.position.z = DOOR_EXT.z; }
    if (_dbgCol)    { _dbgCol.position.x    = DOOR_EXT.x; _dbgCol.position.z    = DOOR_EXT.z; }

    const x = DOOR_EXT.x.toFixed(2);
    const z = DOOR_EXT.z.toFixed(2);
    debugDoorEl.innerHTML =
      `🔴 DOOR TRIGGER DEBUG<br>` +
      `I/K = Z  ·  J/L = X<br>` +
      `X: ${x}  Z: ${z}<br>` +
      `<small>Copy this when done ↓</small><br>` +
      `DOOR_EXT.set(${x}, 0, ${z})`;
    console.log(`[CozyC] DOOR_EXT.set(${x}, 0, ${z})`);
  }
}

function initDebugDoorUI() {
  if (!DEBUG_DOOR) return;
  debugDoorEl.style.display = 'block';
  const x = DOOR_EXT.x.toFixed(2);
  const z = DOOR_EXT.z.toFixed(2);
  debugDoorEl.innerHTML =
    `🔴 DOOR TRIGGER DEBUG<br>` +
    `I/K = move Z  ·  J/L = move X<br>` +
    `X: ${x}  Z: ${z}<br>` +
    `<small>Walk up to the door, nudge red marker onto it</small>`;
}

// ── BED POSITION DEBUG ────────────────────────────────────────────────────
// Persistent offsets from BED_POS; tuned interactively while resting.
let _bedOX = -0.35, _bedOY = -1.35, _bedOZ = 0.20; // tuned to bed surface

function _updateBedHUD() {
  const ox = _bedOX.toFixed(2), oy = _bedOY.toFixed(2), oz = _bedOZ.toFixed(2);
  debugBedEl.innerHTML =
    `🔵 BED POSITION DEBUG<br>` +
    `I/K = Y (up/down)  ·  J/L = X  ·  U/O = Z<br>` +
    `offset  X:${ox}  Y:${oy}  Z:${oz}<br>` +
    `<small>Copy when done ↓</small><br>` +
    `_bedOX=${ox}; _bedOY=${oy}; _bedOZ=${oz};`;
  console.log(`[CozyC] bed offset  _bedOX=${ox}; _bedOY=${oy}; _bedOZ=${oz};`);
}

function nudgeBedPosition() {
  if (!DEBUG_BED || !resting) return;
  const step = 0.05;
  let moved = false;
  if (keys['KeyI']) { _bedOY += step; moved = true; keys['KeyI'] = false; }
  if (keys['KeyK']) { _bedOY -= step; moved = true; keys['KeyK'] = false; }
  if (keys['KeyJ']) { _bedOX -= step; moved = true; keys['KeyJ'] = false; }
  if (keys['KeyL']) { _bedOX += step; moved = true; keys['KeyL'] = false; }
  if (keys['KeyU']) { _bedOZ -= step; moved = true; keys['KeyU'] = false; }
  if (keys['KeyO']) { _bedOZ += step; moved = true; keys['KeyO'] = false; }
  if (!moved) return;
  playerGroup.position.set(
    BED_POS.x + _bedOX,
    BED_SURFACE_Y + _bedOY,
    BED_POS.z + _bedOZ
  );
  _updateBedHUD();
}

// ── MOVEMENT ──────────────────────────────────────────────────────────────
const _dir       = new THREE.Vector3();
const BOUNDS_EXT = { minX: -14, maxX: 14, minZ: -14, maxZ: 14 };
let   BOUNDS_INT = { minX: -3.0, maxX: 3.0, minZ: -2.4, maxZ: 2.6 }; // updated after room loads

function movePlayer(bounds, dt) {
  if (resting) { if (mixer) mixer.update(dt); return; } // frozen on bed
  _dir.set(0, 0, 0);
  if (keys['KeyW'] || keys['ArrowUp'])    _dir.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  _dir.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  _dir.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) _dir.x += 1;

  const moving = _dir.lengthSq() > 0;

  if (moving) {
    _dir.normalize();
    playerGroup.position.x += _dir.x * SPEED * dt;
    playerGroup.position.z += _dir.z * SPEED * dt;
    playerGroup.rotation.y  = Math.atan2(_dir.x, _dir.z);

    const p = playerGroup.position;
    p.x = Math.max(bounds.minX, Math.min(bounds.maxX, p.x));
    p.z = Math.max(bounds.minZ, Math.min(bounds.maxZ, p.z));

  }

  // Drive walk animation speed: 0 = idle, 1.4 = walking
  if (mixer) {
    mixer.update(dt);
    if (walkAction) walkAction.timeScale = moving ? 1.4 : 0;
  }
}

// ── INTERACTION ───────────────────────────────────────────────────────────
function handleInteract() {
  const eDown = keys['KeyE'];
  if (!eDown || eWasDown) { eWasDown = eDown; return; }
  eWasDown = true;

  const pos = playerGroup.position;
  if (!indoor) {
    if (pos.distanceTo(DOOR_EXT) < 2.2) enterHouse();
  } else {
    if (resting) { standUp(); return; }
    if (pos.distanceTo(DOOR_INT) < 1.6) { exitHouse(); return; }
    if (BED_POS && pos.distanceTo(BED_POS) < 1.8) { sitOnBed(); return; }
    if (!hasItem && pickupMesh) {
      const sw = new THREE.Vector3();
      pickupMesh.getWorldPosition(sw);
      if (pos.distanceTo(sw) < 1.3) {
        hasItem = true;
        intScene.remove(pickupMesh);
        pickupMesh = null;
        showMsg('You found the Golden Star! ★');
        invEl.style.display = 'block';
      }
    }
  }
}

// ── BED INTERACTION ───────────────────────────────────────────────────────
function sitOnBed() {
  if (!BED_POS) return;
  resting = true;
  if (walkAction) walkAction.timeScale = 0;

  if (charModel) {
    // Clear the standing foot-offset so the pivot is at the model's geometric centre
    charModel.position.y = 0;
    // Rotate 90° around X → character lies flat, chest facing up
    charModel.rotation.x = -Math.PI / 2;
  }

  // Place group using current debug offsets (tune with I/J/K/L/U/O while resting)
  playerGroup.position.set(
    BED_POS.x + _bedOX,
    BED_SURFACE_Y + _bedOY,
    BED_POS.z + _bedOZ
  );
  if (DEBUG_BED) { debugBedEl.style.display = 'block'; _updateBedHUD(); }

  // Cinematic side-angle orbit to show the lying pose
  orbitTheta  = playerGroup.rotation.y + Math.PI * 0.6;
  orbitPhi    = 1.1;
  ORBIT_R     = 2.8;
  orbitActive = true;

  msgEl.textContent = '💤 Zzz...  Press E to wake up';
  msgEl.style.display = 'block';
  if (msgTimer) { clearTimeout(msgTimer); msgTimer = null; }

  controlsEl.innerHTML = 'Drag — Look around<br>Scroll — Zoom<br>E — Wake up';
}

function standUp() {
  resting     = false;
  orbitActive = false;
  _drag       = false;
  if (charModel) {
    charModel.rotation.x = 0;
    charModel.position.y = _charModelOrigY; // restore standing foot-offset
  }
  playerGroup.position.y = 0;
  msgEl.style.display = 'none';
  debugBedEl.style.display = 'none';
  controlsEl.innerHTML = 'WASD / ↑↓←→ — Move<br>E — Interact';
}

function enterHouse() {
  indoor = true;
  extScene.remove(playerGroup);
  intScene.add(playerGroup);
  playerGroup.position.set(0, 0, 0);
  playerGroup.rotation.y = 0;
  playerGroup.scale.setScalar(0.55); // shrink to fit room proportions
  locEl.textContent = '🏠 Inside Your House';
  showMsg('Welcome home! Press E near the door to leave.');
}

function exitHouse() {
  if (resting) standUp();
  indoor = false;
  intScene.remove(playerGroup);
  extScene.add(playerGroup);
  playerGroup.position.set(0.65, 0, 3.2);
  playerGroup.rotation.y = Math.PI;
  playerGroup.scale.setScalar(1.0); // restore full size outside
  locEl.textContent = '🌿 Cozy Garden';
}

// ── HINTS ─────────────────────────────────────────────────────────────────
function updateHints() {
  const pos = playerGroup.position;
  let hint = '';
  if (!indoor) {
    if (pos.distanceTo(DOOR_EXT) < 2.2) hint = 'Press E to enter the house';
  } else {
    if (pos.distanceTo(DOOR_INT) < 1.6) {
      hint = 'Press E to go outside';
    } else if (BED_POS && !resting && pos.distanceTo(BED_POS) < 1.8) {
      hint = 'Press E to rest on the bed';
    } else if (!hasItem && pickupMesh) {
      const sw = new THREE.Vector3();
      pickupMesh.getWorldPosition(sw);
      if (pos.distanceTo(sw) < 1.6) hint = 'Press E to pick up the golden star';
    }
  }
  hintEl.textContent = hint;
  hintEl.style.display = hint ? 'block' : 'none';
}

// ── CAMERA ────────────────────────────────────────────────────────────────
const _orbitTarget = new THREE.Vector3();
const _orbitPos    = new THREE.Vector3();

function updateCamera() {
  const t = playerGroup.position;

  if (orbitActive) {
    // Orbit around the character's centre (slightly above feet)
    _orbitTarget.set(t.x, t.y + 0.5, t.z);
    _orbitPos.set(
      _orbitTarget.x + ORBIT_R * Math.sin(orbitPhi) * Math.sin(orbitTheta),
      _orbitTarget.y + ORBIT_R * Math.cos(orbitPhi),
      _orbitTarget.z + ORBIT_R * Math.sin(orbitPhi) * Math.cos(orbitTheta)
    );
    camera.position.lerp(_orbitPos, 0.08);
    camera.lookAt(_orbitTarget);
  } else {
    const offset = indoor ? CAM_OFFSET_INT : CAM_OFFSET_EXT;
    camera.position.lerp(t.clone().add(offset), 0.1);
    camera.lookAt(t.x, t.y + 1, t.z);
  }
}

// ── ANIMATE ITEMS ─────────────────────────────────────────────────────────
function animateItems(dt) {
  if (pickupMesh) {
    starAngle += dt * 2.2;
    pickupMesh.rotation.y = starAngle;
    pickupMesh.position.y = 0.9 + Math.sin(starAngle * 1.6) * 0.07;
  }
}

// ── LOOP ──────────────────────────────────────────────────────────────────
let lastT = performance.now();
function tick() {
  requestAnimationFrame(tick);
  const now = performance.now();
  const dt  = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  if (indoor) {
    movePlayer(BOUNDS_INT, dt);
    animateItems(dt);
    renderer.render(intScene, camera);
  } else {
    movePlayer(BOUNDS_EXT, dt);
    renderer.render(extScene, camera);
  }

  updateCamera();
  handleInteract();
  updateHints();
  nudgeDoorTrigger();
  nudgeBedPosition();
}


// ── INIT ──────────────────────────────────────────────────────────────────
buildExterior();
loadCharacter();             // all three call _onAssetLoaded(); tick() fires when all finish
loadEnvironment(_onAssetLoaded);
loadInterior(_onAssetLoaded);
</script>
</body>
</html>
